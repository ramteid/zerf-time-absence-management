services:
  postgres:
    image: postgres:18
    container_name: kitazeit-postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - POSTGRES_DB=${KITAZEIT_POSTGRES_DB:-kitazeit}
      - POSTGRES_USER=${KITAZEIT_POSTGRES_USER:-kitazeit}
      - POSTGRES_PASSWORD=${KITAZEIT_POSTGRES_PASSWORD:?KITAZEIT_POSTGRES_PASSWORD must be set in .env (openssl rand -hex 32)}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256 --auth-local=scram-sha-256 --data-checksums
    command:
      - postgres
      - -c
      - password_encryption=scram-sha-256
      - -c
      - ssl=off
      - -c
      - idle_in_transaction_session_timeout=30000
      - -c
      - statement_timeout=30000
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -h 127.0.0.1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - private

  app:
    build:
      context: ..
    container_name: kitazeit-app
    restart: unless-stopped
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - KITAZEIT_DATABASE_URL=${KITAZEIT_DATABASE_URL:-postgres://${KITAZEIT_POSTGRES_USER:-kitazeit}:${KITAZEIT_POSTGRES_PASSWORD:?KITAZEIT_POSTGRES_PASSWORD must be set in .env (openssl rand -hex 32)}@postgres:5432/${KITAZEIT_POSTGRES_DB:-kitazeit}?sslmode=disable}
      - KITAZEIT_SESSION_SECRET=${KITAZEIT_SESSION_SECRET:?KITAZEIT_SESSION_SECRET must be set in .env (>=32 chars random)}
      - KITAZEIT_ADMIN_EMAIL=${KITAZEIT_ADMIN_EMAIL:?KITAZEIT_ADMIN_EMAIL must be set in .env}
      - KITAZEIT_BIND=0.0.0.0:3000
      - KITAZEIT_PUBLIC_URL=http://localhost:3000
      - KITAZEIT_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - KITAZEIT_SECURE_COOKIES=false
      - KITAZEIT_ENFORCE_CSRF=true
      - KITAZEIT_ENFORCE_ORIGIN=true
    ports:
      - "127.0.0.1:3000:3000"
    expose:
      - "3000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "wget -qO- --timeout=3 http://127.0.0.1:3000/healthz | grep -q ok"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - public
      - private

  backup:
    image: postgres:18
    container_name: kitazeit-backup
    restart: unless-stopped
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGDATABASE=${KITAZEIT_POSTGRES_DB:?KITAZEIT_POSTGRES_DB must be set in .env}
      - PGUSER=${KITAZEIT_POSTGRES_USER:?KITAZEIT_POSTGRES_USER must be set in .env}
      - PGPASSWORD=${KITAZEIT_POSTGRES_PASSWORD:?KITAZEIT_POSTGRES_PASSWORD must be set in .env}
      - BACKUP_INTERVAL_SECONDS=${BACKUP_INTERVAL_SECONDS:-86400}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - ../scripts/backup.sh:/usr/local/bin/backup.sh:ro
      - backup_data:/backups
    entrypoint: ["/bin/sh", "/usr/local/bin/backup.sh", "/backups"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - private

volumes:
  postgres_data:
    name: kitazeit_postgres_data_pg18
  backup_data:
    name: kitazeit_backup_data

networks:
  public:
  private:
    internal: true
