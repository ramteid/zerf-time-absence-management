name: zerf

services:
  postgres:
    image: ghcr.io/ramteid/zerf-time-absence-management-postgres:${ZERF_VERSION:-latest}
    build:
      context: .
      dockerfile: postgres.Dockerfile
    container_name: zerf-postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # Drop all Linux capabilities, then re-add only the minimal set the
    # root→gosu startup needs. The custom entrypoint runs as root to chown the
    # keyring tmpfs and /data, then the upstream entrypoint drops to the postgres
    # user via gosu (setuid/setgid syscalls). CHOWN/FOWNER/DAC_OVERRIDE cover the
    # ownership and permission fixes during setup; SETUID/SETGID cover the gosu
    # privilege drop. Mirrors the cap_drop already applied to app and backup.
    cap_drop: [ALL]
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    # The pg_tde principal key lives on an in-memory tmpfs so it is never
    # written to disk.  No elevated capabilities are required — pg_tde is a
    # PostgreSQL storage extension, not a FUSE filesystem.  1 MiB is plenty
    # for the keyring file (typically a few hundred bytes).
    tmpfs:
      - /var/lib/pg_tde_keyring:size=1m
      # /tmp inside the postgres container is used during restore
      # (docker cp copies the decrypted dump there before pg_restore reads it).
      # Without an explicit tmpfs, /tmp is disk-backed (overlay filesystem),
      # meaning the full plaintext dump briefly touches the host disk.
      # A RAM-backed tmpfs ensures the plaintext never reaches persistent storage.
      # 256 MiB is ample for both pg_restore's own temp files and the dump file.
      - /tmp:size=256m
    environment:
      - POSTGRES_DB=${ZERF_POSTGRES_DB:-zerf}
      - POSTGRES_USER=${ZERF_POSTGRES_USER:-zerf}
      - POSTGRES_PASSWORD=${ZERF_POSTGRES_PASSWORD:?ZERF_POSTGRES_PASSWORD must be set in .env (openssl rand -hex 32)}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256 --auth-local=scram-sha-256 --data-checksums
      # Single key for both DB-at-rest (pg_tde keyring wrap) and backup (openssl) encryption.
      - ZERF_DB_ENCRYPTION_KEY=${ZERF_DB_ENCRYPTION_KEY:?ZERF_DB_ENCRYPTION_KEY must be set in .env (openssl rand -hex 32)}
    command:
      - postgres
      - -c
      # Load pg_tde so the tde_heap access method and WAL encryption are
      # available before any user connection opens.
      - shared_preload_libraries=pg_tde
      - -c
      - password_encryption=scram-sha-256
      - -c
      - ssl=off
      - -c
      - idle_in_transaction_session_timeout=30000
      - -c
      - statement_timeout=30000
    volumes:
      # The Percona PostgreSQL 18 image uses PGDATA=/data/db; mount the named
      # volume at /data so the wrapped keyring at /data/pg_tde_keyring.enc persists.
      - postgres_data:/data
      # The Percona image declares VOLUME [/data/db] in its Dockerfile, which
      # causes Docker to create an anonymous volume at /data/db on every container
      # recreation — shadowing the parent named volume and silently losing all data.
      # An explicit named volume here prevents that: Docker respects explicit mounts
      # over image VOLUME declarations, so /data/db always uses zerf_postgres_db_data.
      - postgres_db_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -h 127.0.0.1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - private
      # backup_net is a separate internal network shared only with the backup
      # container. This isolates the backup service (which holds
      # ZERF_DB_ENCRYPTION_KEY) from the app container: a compromised app
      # cannot reach the backup container even though both are on internal nets.
      - backup_net

  app:
    image: ghcr.io/ramteid/zerf-time-absence-management:${ZERF_VERSION:-latest}
    build:
      context: ..
      dockerfile: docker/app.Dockerfile
      args:
        ZERF_GIT_COMMIT: ${ZERF_GIT_COMMIT:-unknown}
        ZERF_BUILD_PROFILE: ${ZERF_BUILD_PROFILE:-release}
        ZERF_FRONTEND_DEBUG_BUILD: ${ZERF_FRONTEND_DEBUG_BUILD:-false}
    container_name: zerf-app
    restart: unless-stopped
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ZERF_DATABASE_URL=${ZERF_DATABASE_URL:-postgres://${ZERF_POSTGRES_USER:-zerf}:${ZERF_POSTGRES_PASSWORD:?ZERF_POSTGRES_PASSWORD must be set in .env (openssl rand -hex 32)}@postgres:5432/${ZERF_POSTGRES_DB:-zerf}?sslmode=disable}
      - ZERF_SESSION_SECRET=${ZERF_SESSION_SECRET:?ZERF_SESSION_SECRET must be set in .env (>=32 chars random)}
      - ZERF_BIND=0.0.0.0:3333
      - ZERF_PUBLIC_URL=http://localhost:3333
      - ZERF_SECURE_COOKIES=false
      - ZERF_ENFORCE_CSRF=true
      # Local mode is intended for LAN access from arbitrary client IPs,
      # so origin enforcement is disabled here. The public compose overlay
      # re-enables it together with HTTPS and a fixed domain.
      - ZERF_ENFORCE_ORIGIN=false
      - RUST_BACKTRACE=${RUST_BACKTRACE:-0}
    ports:
      - "0.0.0.0:3333:3333"
    expose:
      - "3333"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "wget -qO- --timeout=3 http://127.0.0.1:3333/healthz | grep -q ok"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - public
      - private

  backup:
    image: ghcr.io/ramteid/zerf-time-absence-management-backup:${ZERF_VERSION:-latest}
    build:
      # Repo-root context so backup.Dockerfile can COPY scripts/backup.sh into
      # the image (it is no longer bind-mounted). Matches the app image build.
      context: ..
      dockerfile: docker/backup.Dockerfile
    container_name: zerf-backup
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGDATABASE=${ZERF_POSTGRES_DB:?ZERF_POSTGRES_DB must be set in .env}
      - PGUSER=${ZERF_POSTGRES_USER:?ZERF_POSTGRES_USER must be set in .env}
      - PGPASSWORD=${ZERF_POSTGRES_PASSWORD:?ZERF_POSTGRES_PASSWORD must be set in .env}
      - ZERF_GIT_COMMIT=${ZERF_GIT_COMMIT:-unknown}
      # Backup interval/retention settings are now stored in app_settings (Admin UI).
      # BACKUP_INTERVAL_SECONDS and BACKUP_RETENTION_DAYS env vars have been removed.
      # Same key used to encrypt backup files with AES-256-CBC via openssl.
      - ZERF_DB_ENCRYPTION_KEY=${ZERF_DB_ENCRYPTION_KEY:?ZERF_DB_ENCRYPTION_KEY must be set in .env (openssl rand -hex 32)}
    volumes:
      # backup.sh is now baked into the image (see backup.Dockerfile); no host
      # bind-mount, so the published image is self-contained.
      - backup_data:/backups
      # Read-only access to the postgres keyring volume so each backup can
      # include a copy of the pg_tde keyring (zerf-<ts>.keyring.enc). This makes
      # physical recovery of an orphaned, encrypted PGDATA volume possible even
      # if the keyring volume is later lost or overwritten. This volume holds
      # only the already-AES-encrypted keyring file and an empty db/ mountpoint
      # — the data directory lives in the separate zerf_postgres_db_data volume
      # — and the keyring is encrypted with ZERF_DB_ENCRYPTION_KEY, which this
      # container already holds, so it gains no additional access to table data.
      - postgres_data:/keyring-src:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/backup.sh", "/backups"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      # backup_net only — deliberately not on `private` so a compromised app
      # container cannot reach this service or its ZERF_DB_ENCRYPTION_KEY.
      - backup_net
      # backup_egress allows outgoing HTTPS to Nextcloud without giving the
      # backup container access to the private app network.
      - backup_egress
volumes:
  postgres_data:
    name: zerf_postgres_data
  postgres_db_data:
    name: zerf_postgres_db_data
  backup_data:
    name: zerf_backup_data

networks:
  public:
  private:
    internal: true
  backup_net:
    # Isolated internal network for postgres ↔ backup only.
    # The app container is intentionally absent from this network.
    internal: true
  backup_egress:
    # Non-internal network for the backup container's outgoing HTTPS uploads.
    # Only the backup service is attached; the app is not on this network.
