name: Auto-merge Dependabot

# NOTE: must use pull_request_target so the GITHUB_TOKEN has write
# permissions on Dependabot-authored PRs (on plain pull_request events
# Dependabot PRs receive a read-only token, which would make the
# approve/merge calls fail with 403).
on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  automerge:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve PR
        continue-on-error: true
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        run: gh pr merge --auto --squash --delete-branch "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-failure:
    name: Open issue on failure
    needs: automerge
    if: failure() && github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create failure issue
        run: |
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "Auto-merge failed for Dependabot PR #${{ github.event.pull_request.number }}" \
            --body "The [auto-merge workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) failed for ${{ github.event.pull_request.html_url }}. Please check the logs and merge manually if appropriate." \
            --label "dependencies"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
