name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build, push images, and create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set image base and version
        run: |
          echo "IMAGE_BASE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Inject version into source files
        run: |
          sed -i "s/^version = \"0\.0\.0\"/version = \"${VERSION}\"/" backend/Cargo.toml
          npm pkg set version="${VERSION}" --prefix frontend

      - name: Log in to GitHub Container Registry
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push app image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/app.Dockerfile
          push: true
          build-args: |
            ZERF_GIT_COMMIT=${{ github.sha }}
            ZERF_VERSION=${{ env.VERSION }}
          tags: |
            ${{ env.IMAGE_BASE }}:${{ env.VERSION }}
            ${{ env.IMAGE_BASE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push postgres image
        uses: docker/build-push-action@v7
        with:
          context: docker
          file: docker/postgres.Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-postgres:${{ env.VERSION }}
            ${{ env.IMAGE_BASE }}-postgres:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push caddy image
        uses: docker/build-push-action@v7
        with:
          context: docker
          file: docker/Caddyfile.Dockerfile
          push: true
          build-args: |
            ZERF_GIT_COMMIT=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_BASE }}-caddy:${{ env.VERSION }}
            ${{ env.IMAGE_BASE }}-caddy:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --notes-file "${{ steps.cliff.outputs.changelog }}"
